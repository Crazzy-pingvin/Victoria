#---------------------------------------------------------------Бумаги-------
#-----------------------------------инженер-----------------------------
- type: entity
  id: NKMPaperE
  name: Памятка инженера Накамуры
  suffix: Накамура
  parent: Paper
  components:
  - type: TimedDespawn
    lifetime: 1200
  - type: Paper
    content: |
      Вы инженер. Ваше дело - строить, собирать, ремонтировать. А ещё быть самым технически-умным челом в этой стороне космоса.
      ------------------------------------------------------------------------
      Ваши навыки: Базовые навыки, разборка сложных объектов, базовый атмос, постройка сложных объектов, постройка приборов, продвинутые генераторы
      ------------------------------------------------------------------------
      Руководство к отыгрышу: Вы ответственный. Вы много учились, зарабатывали себе репутацию. Вы отличный специалист и честный сотрудник. Однозначно самовлюблённый и осознающий свою крутость! Вы же не хер с голы! Вы Инженер Накамуры!
      ------------------------------------------------------------------------
      Краткий лор организации: Накамура Инжениринг - одна из пяти самых крупных корпораций в Галактике, занимающаяся промышленным производством, постройкой энергетического обьорудования, пром.установок и т.д. и т.п. Кроме тго именно в ней работают лучшие инженеры галактики. Помимо прочего славиться специфической системой управления, адсмкою бюрократией и попаток сотрудников делась всё без бумажек.
