#----------------------------------------------------------Лорные напитки----------------------
#---------------------------------------------Умпорские-------------------------------------
#----------------------------------Пехотное пиво-----------------------------------------
#-------------------Вкус--------------------------------------------------------------
- type: flavor
  id: FlavorUmporInfantryBeer
  flavorType: Complex
  description: flavor-complex-umpor_infantry_beer
#-------------------Реагент-----------------------------------------------------------
- type: reagent
  id: UmporInfantryBeer
  name: Умпорское пехотное пиво
  parent: BaseAlcohol
  desc: Приятное на вкус, с воспоминаниями о доме...
  physicalDesc: reagent-physical-desc-umpor_infantry_beer
  flavor: FlavorUmporInfantryBeer
  color: "#d7d7d7"
  metamorphicSprite:
    sprite: Victoria/Objects/Misc/Drinks/umpor_infantry_beer.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 2
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 3
      - !type:AdjustReagent
        reagent: Ethanol
        amount: 0.03
#-------------------Рецепт------------------------------------------------------------      
- type: reaction
  id: UmporInfantryBeer
  reactants:
    Beer:
      amount: 1
    IceCream:
      amount: 1
  products:
    UmporInfantryBeer: 2
#-------------------Напиток-----------------------------------------------------------
- type: entity
  parent: DrinkGlass
  id: DrinkUmporInfantryBeerGlass
  suffix: Умпорское пехотное пиво
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: UmporInfantryBeer
          Quantity: 30
  - type: Icon
    sprite: Victoria/Objects/Misc/Drinks/umpor_infantry_beer.rsi
    state: icon
#----------------------------------Честный труд-----------------------------------------
#-------------------Вкус--------------------------------------------------------------
- type: flavor
  id: FlavorUmporHornestWork
  flavorType: Complex
  description: flavor-complex-umpor_honest_work
#-------------------Реагент-----------------------------------------------------------
- type: reagent
  id: UmporHornestWork
  name: Коктейль "Честный труд"
  parent: BaseAlcohol
  desc: Такое, что потом можно сдвинуть горы и дать свет людям!
  physicalDesc: reagent-physical-desc-umpor_honest_work
  flavor: FlavorUmporHornestWork
  color: "#8b8880"
  metamorphicSprite:
    sprite: Victoria/Objects/Misc/Drinks/umpor_honest_work.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 2
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 2
      - !type:AdjustReagent
        reagent: Ethanol
        amount: 0.1
      - !type:GenericStatusEffect
        key: Drowsiness
        time: 1.0
        type: Remove
      - !type:AdjustReagent
        reagent: Theobromine
        amount: 0.1
#-------------------Рецепт------------------------------------------------------------
- type: reaction
  id: UmporHornestWork
  reactants:
    Iron:
      amount: 1
    JuiceLime:
      amount: 2
    SodaWater:
      amount: 2 
  products:
    UmporHornestWork: 5
#-------------------Напиток-----------------------------------------------------------
- type: entity
  parent: DrinkGlass
  id: DrinkUmporHornestWorkGlass
  suffix: Коктейль "Честный труд"
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: UmporHornestWork
          Quantity: 30
  - type: Icon
    sprite: Victoria/Objects/Misc/Drinks/umpor_honest_work.rsi
    state: icon
