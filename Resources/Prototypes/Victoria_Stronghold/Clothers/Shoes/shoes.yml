  parent: ClothingShoesBase
  id: StrongBastShoes
  name: лапти
  suffix: Стронгхолд, Крестьяне
  description: Какая-никакая обувка из коры да бересты, сплетёные или склеенные смолой. Лучше, чем босиком...
  components:
  - type: Sprite
    sprite: Victoria_Stronghold/Clothers/Shoes/bast_shoes.rsi
  - type: Clothing
    sprite: Victoria_Stronghold/Clothers/Shoes/bast_shoes.rsi
