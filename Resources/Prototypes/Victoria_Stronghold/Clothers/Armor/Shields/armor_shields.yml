- type: entity
  name: досчатый щит
  parent: [ BaseShield, BaseRestrictedContraband ]
  id: StrongArmorShieldPlanky
  suffix: Стронгхолд, Щит
  description: Щит из досок, скрепленных поперечинами и оббитый по периметру металлом.
  components:
    - type: Item
      size: Large
      sprite: Victoria_Stronghold/Clothers/Armor/Shields/shield_planky.rsi
      heldPrefix: metal                 #!!!!!!!!!!!!!!!!!!!!!!!!!
    - type: StaticPrice
      price: 90
    - type: Blocking
      passiveBlockModifier:
        coefficients:
          Blunt: 0.8
          Slash: 0.8
          Piercing: 0.8
      activeBlockModifier:
        coefficients:
          Blunt: 0.7
          Slash: 0.7
          Piercing: 0.7
        flatReductions:
          Blunt: 1
          Slash: 1
    - type: Reflect
      reflectProb: 0.2
      reflects:
        - NonEnergy
      soundOnReflect: /Audio/Effects/metal_slam4.ogg
    - type: Sprite
      sprite: Victoria_Stronghold/Clothers/Armor/Shields/shield_planky.rsi
      state: buckler-icon
