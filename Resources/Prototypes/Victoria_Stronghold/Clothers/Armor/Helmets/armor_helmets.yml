#-------------------------------------------------------лорд----------
- type: entity
  parent: ClothingHeadHelmetBasic
  id: StrongArmorHelmetTophelmLord
  name: топхельм лорда
  suffix: Стронгхолд, Броня, Голова
  description: Это вам не ведро. Это качественно сделанный прочный шлем с узкими прорезями для глаз и отверстиями для жыхания. Имеет украшения, приличествующие статусу.
  components:
  - type: Sprite
    sprite: Victoria_Stronghold/Clothers/Armor/Helmets/tophelm_lord.rsi
  - type: Clothing
    sprite: Victoria_Stronghold/Clothers/Armor/Helmets/tophelm_lord.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.65
        Piercing: 0.65
