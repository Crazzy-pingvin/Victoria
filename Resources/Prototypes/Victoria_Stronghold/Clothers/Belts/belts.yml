- type: entity
  parent: ClothingBeltStorageBase
  id: StrongBeltSkinNoble
  name: кожаный пояс с мошной
  suffix: Стронгхолд, Дворяне
  description: Кожаный пояс из толстого чепрака, крепящейся завязыванием через кольцо с небольшим мешочком для мелочей или денег на боку.
