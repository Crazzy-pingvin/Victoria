#-------------------------------------------------------лорд----------
- type: entity
  parent: ClothingNeckBase
  id: StrongNeckLord
  name: меховой плащ лорда
  suffix: Стронгхолд, Лорд
  description: Выкрашеный в красный цвет дорожный плащ лорда, подбитый мехом. Выражает статус и богаство своего хозяина.
  components:
  - type: Sprite
    sprite: Victoria_Stronghold/Clothers/Neck/cloak_fur_red.rsi
#-------------------------------------------------------дворяне----------
- type: entity
  parent: ClothingNeckBase
  id: StrongNeckNoble
  name: меховой плащ дворянина
  suffix: Стронгхолд, Дворяне
  description: Выкрашеный в фиолетовый цвет дорожный плащ знатной особы, подбитый мехом. Выражает статус своего хозяина.
  components:
  - type: Sprite
    sprite: Victoria_Stronghold/Clothers/Neck/cloak_noble.rsi
